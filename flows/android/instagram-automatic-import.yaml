# Android Instagram Automatic Import Sheet (Regression)
# Ported from iOS: validates the Automatic Instagram import sheet opens
# after switching mode in Settings.
#
# Run: maestro test flows/android/instagram-automatic-import.yaml

appId: com.amakaflow.companion

onFlowError:
  - takeScreenshot: artifacts/screenshots/android-instagram-automatic-import-error

---

- launchApp:
    clearState: true
    stopApp: true
    arguments:
      UITEST_MODE: "true"
      UITEST_AUTH_SECRET: "${UITEST_AUTH_SECRET}"
      UITEST_USER_ID: "${UITEST_USER_ID:-test-user-123}"
      UITEST_USE_FIXTURES: "true"
      UITEST_FIXTURES: "amrap_10min"
      UITEST_SKIP_ONBOARDING: "true"

# Dismiss Android system dialogs
- waitForAnimationToEnd
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "While using the app"
    optional: true

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 15000

# Step 1: Switch mode to Automatic in Settings
- tapOn:
    id: "nav_more"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "more_screen"
    timeout: 10000

- tapOn:
    text: "Settings"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "settings_screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      text: "Instagram Import"
    direction: DOWN
    timeout: 10000
    speed: 25

- tapOn:
    text: "Automatic"
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/android-instagram-automatic-01-settings

# Step 2: Navigate to Sources and tap Instagram
- back

- tapOn:
    text: "Sources"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "sources_screen"
    timeout: 10000

# Verify subtitle reflects Automatic mode
- scrollUntilVisible:
    element:
      text: "Instagram"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    text: "Import from saved reels"

# Tap Instagram row
- tapOn:
    text: "Instagram"
    retryTapIfNoChange: true

# Wait for automatic sheet
- extendedWaitUntil:
    visible:
      id: "automatic_instagram_sheet"
    timeout: 5000

# Verify automatic sheet content (URL field, not caption editor)
- assertVisible:
    text: "Paste an Instagram Reel URL"

- assertVisible:
    text: "Import from Instagram"

# Verify manual sheet is NOT showing
- assertNotVisible:
    text: "Paste the workout caption"

- takeScreenshot: artifacts/screenshots/android-instagram-automatic-02-sheet

# Dismiss
- tapOn:
    text: "Cancel"

- extendedWaitUntil:
    visible:
      id: "sources_screen"
    timeout: 5000

- takeScreenshot: artifacts/screenshots/android-instagram-automatic-03-dismissed
