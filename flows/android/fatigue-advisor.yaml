# Android Fatigue Advisor Flow
# Tests fatigue advisor: body map, question auto-fill, advice response sections
#
# Run: maestro test flows/android/fatigue-advisor.yaml

appId: com.amakaflow.companion

onFlowError:
  - takeScreenshot: artifacts/screenshots/android-fatigue-advisor-error

---

- launchApp:
    clearState: true
    stopApp: true
    arguments:
      UITEST_MODE: "true"
      UITEST_AUTH_SECRET: "${UITEST_AUTH_SECRET}"
      UITEST_USER_ID: "${UITEST_USER_ID:-test-user-123}"
      UITEST_USE_FIXTURES: "true"
      UITEST_FIXTURES: "amrap_10min,strength_block_w1"
      UITEST_SKIP_ONBOARDING: "true"

# Dismiss Android system dialogs
- waitForAnimationToEnd
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "While using the app"
    optional: true

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 15000

# ============================================
# Navigate to Fatigue Advisor via More tab
# ============================================

- tapOn:
    id: "nav_more"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "more_screen"
    timeout: 10000

- tapOn:
    text: "Fatigue Advisor"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "fatigue_advisor_screen"
    timeout: 10000

- takeScreenshot: artifacts/screenshots/android-fatigue-advisor-01-overview

# ============================================
# Tap body map muscle group
# ============================================

- assertVisible:
    id: "body_map"

- tapOn:
    id: "body_map_quadriceps"
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/android-fatigue-advisor-02-muscle-selected

# ============================================
# Verify question auto-fills
# ============================================

- assertVisible:
    id: "fatigue_question_field"

- takeScreenshot: artifacts/screenshots/android-fatigue-advisor-03-question-autofill

# ============================================
# Check advice response sections
# ============================================

# Submit the question
- tapOn:
    id: "fatigue_send_button"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "advice_response_section"
    timeout: 30000

- assertVisible:
    id: "advice_response_section"

- takeScreenshot: artifacts/screenshots/android-fatigue-advisor-04-advice-response

# Scroll to see full response
- scrollUntilVisible:
    element:
      id: "advice_recommendations"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "advice_recommendations"
    optional: true

- takeScreenshot: artifacts/screenshots/android-fatigue-advisor-05-recommendations

# Go back
- back

# Final assertions
- assertNotVisible:
    id: "error_view"
    optional: true
