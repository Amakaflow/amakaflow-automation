# Android Export Workout Flow
# Tests workout export: format options (FIT, JSON, PDF, TCX), select format
#
# Run: maestro test flows/android/export-workout.yaml

appId: com.amakaflow.companion

onFlowError:
  - takeScreenshot: artifacts/screenshots/android-export-workout-error

---

- launchApp:
    clearState: true
    stopApp: true
    arguments:
      UITEST_MODE: "true"
      UITEST_AUTH_SECRET: "${UITEST_AUTH_SECRET}"
      UITEST_USER_ID: "${UITEST_USER_ID:-test-user-123}"
      UITEST_USE_FIXTURES: "true"
      UITEST_FIXTURES: "strength_block_w1"
      UITEST_SKIP_ONBOARDING: "true"

# Dismiss Android system dialogs
- waitForAnimationToEnd
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "While using the app"
    optional: true

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 15000

# Navigate to workouts tab
- tapOn:
    id: "nav_workouts"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "workouts_screen"
    timeout: 10000

# ============================================
# Open workout detail
# ============================================

- tapOn:
    id: "workout_item_0"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "workout_detail_screen"
    timeout: 10000

- takeScreenshot: artifacts/screenshots/android-export-workout-01-detail

# ============================================
# Tap export button
# ============================================

- tapOn:
    id: "export_button"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "export_sheet"
    timeout: 5000

- takeScreenshot: artifacts/screenshots/android-export-workout-02-export-sheet

# ============================================
# Verify format options
# ============================================

- assertVisible:
    text: "FIT"

- assertVisible:
    text: "JSON"

- assertVisible:
    text: "PDF"

- assertVisible:
    text: "TCX"

- takeScreenshot: artifacts/screenshots/android-export-workout-03-format-options

# ============================================
# Select a format (FIT)
# ============================================

- tapOn:
    text: "FIT"
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/android-export-workout-04-format-selected

# Dismiss export/share sheet
- tapOn:
    text: "Cancel"
    optional: true
- back

# Final assertions
- assertNotVisible:
    id: "error_view"
    optional: true
