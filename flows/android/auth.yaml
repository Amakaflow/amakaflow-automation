# Android Authentication Flow
# Tests login functionality using UITEST auth bypass OR credential-based login.
#
# Run: maestro test flows/android/auth.yaml
#
# This flow supports two modes:
#   1. UITEST auth bypass (preferred for CI) - set UITEST_AUTH_SECRET
#   2. Credential-based login - set TEST_EMAIL and TEST_PASSWORD
#
# If neither auth method is configured, the flow will skip login
# and verify the app reaches either login or home screen.

appId: com.amakaflow.companion

onFlowError:
  - takeScreenshot: artifacts/screenshots/android-auth-error

env:
  TEST_EMAIL: ${TEST_EMAIL:-test@example.com}
  TEST_PASSWORD: ${TEST_PASSWORD:-}

---

# ============================================
# Mode 1: UITEST auth bypass (preferred)
# ============================================
- runFlow:
    when:
      env:
        UITEST_AUTH_SECRET: ".+"
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            UITEST_MODE: "true"
            UITEST_AUTH_SECRET: "${UITEST_AUTH_SECRET}"
            UITEST_USER_ID: "${UITEST_USER_ID:-test-user-123}"
            UITEST_SKIP_ONBOARDING: "true"

      # Dismiss Android system dialogs
      - waitForAnimationToEnd
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "While using the app"
          optional: true

      - extendedWaitUntil:
          visible:
            id: "home_screen"
          timeout: 15000

      - takeScreenshot: artifacts/screenshots/android-auth-01-uitest-bypass

# ============================================
# Mode 2: Credential-based login (fallback)
# ============================================
- runFlow:
    when:
      notVisible:
        id: "home_screen"
    commands:
      - launchApp:
          clearState: true
          stopApp: true

      # Dismiss Android system dialogs
      - waitForAnimationToEnd
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "While using the app"
          optional: true

      - takeScreenshot: artifacts/screenshots/android-auth-01-start

      # Attempt login only if login screen is visible AND password is set
      - runFlow:
          when:
            visible:
              id: "login_screen"
          commands:
            # Enter email
            - tapOn:
                id: "email_field"
            - inputText: ${TEST_EMAIL}

            - takeScreenshot: artifacts/screenshots/android-auth-02-email-entered

            # Enter password (skip if not set)
            - runFlow:
                when:
                  env:
                    TEST_PASSWORD: ".+"
                commands:
                  - tapOn:
                      id: "password_field"
                  - inputText: ${TEST_PASSWORD}

                  - takeScreenshot: artifacts/screenshots/android-auth-03-password-entered

                  # Tap login button
                  - tapOn:
                      id: "login_button"
                      retryTapIfNoChange: true

                  # Wait for home screen after login
                  - extendedWaitUntil:
                      visible:
                        id: "home_screen"
                      timeout: 15000

                  - takeScreenshot: artifacts/screenshots/android-auth-04-logged-in

# ============================================
# Verify final state
# ============================================

# At this point we should be on home screen (via bypass or login)
# This MUST pass — if auth didn't work, the test should fail
- assertVisible:
    id: "home_screen"

# Verify user is authenticated (profile button visible)
- assertVisible:
    id: "user_profile_button"

- takeScreenshot: artifacts/screenshots/android-auth-05-complete

# Final assertions
- assertNotVisible:
    id: "error_view"
    optional: true
- assertNotVisible:
    id: "crash_dialog"
    optional: true
