# Android Instagram Import Mode Settings Toggle (Smoke)
# Ported from iOS: validates the Settings segmented picker toggles between
# Automatic/Manual mode and the subtitle updates accordingly.
#
# Run: maestro test flows/android/instagram-import-mode-settings.yaml

appId: com.amakaflow.companion

onFlowError:
  - takeScreenshot: artifacts/screenshots/android-instagram-settings-error

---

- launchApp:
    clearState: true
    stopApp: true
    arguments:
      UITEST_MODE: "true"
      UITEST_AUTH_SECRET: "${UITEST_AUTH_SECRET}"
      UITEST_USER_ID: "${UITEST_USER_ID:-test-user-123}"
      UITEST_USE_FIXTURES: "true"
      UITEST_FIXTURES: "amrap_10min"
      UITEST_SKIP_ONBOARDING: "true"

# Dismiss Android system dialogs
- waitForAnimationToEnd
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "While using the app"
    optional: true

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 15000

# Navigate to Settings via More tab
- tapOn:
    id: "nav_more"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "more_screen"
    timeout: 10000

- tapOn:
    text: "Settings"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "settings_screen"
    timeout: 10000

# Scroll to Instagram Import card in Integrations section
- scrollUntilVisible:
    element:
      text: "Instagram Import"
    direction: DOWN
    timeout: 10000
    speed: 25

- takeScreenshot: artifacts/screenshots/android-instagram-settings-01-default

# Default mode should be Manual -- verify subtitle
- assertVisible:
    text: "Paste caption text"

# Tap "Automatic" segment
- tapOn:
    text: "Automatic"
    retryTapIfNoChange: true

# Verify subtitle changed
- assertVisible:
    text: "Paste reel URL (requires Apify)"

- takeScreenshot: artifacts/screenshots/android-instagram-settings-02-automatic

# Switch back to Manual
- tapOn:
    text: "Manual"
    retryTapIfNoChange: true

# Verify subtitle reverted
- assertVisible:
    text: "Paste caption text"

- takeScreenshot: artifacts/screenshots/android-instagram-settings-03-manual-again
