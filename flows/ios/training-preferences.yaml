# iOS Training Preferences Flow
# Tests settings > training preferences: volume slider, hard days, run days, goal race
#
# Run: maestro test flows/ios/training-preferences.yaml

appId: com.myamaka.AmakaFlowCompanion

onFlowError:
  - takeScreenshot: artifacts/screenshots/ios-training-preferences-error

---

- launchApp:
    clearState: true
    stopApp: true
    arguments:
      UITEST_MODE: "true"
      UITEST_AUTH_SECRET: "${UITEST_AUTH_SECRET}"
      UITEST_USER_ID: "${UITEST_USER_ID:-test-user-123}"
      UITEST_USE_FIXTURES: "true"
      UITEST_FIXTURES: "amrap_10min"
      UITEST_SKIP_ONBOARDING: "true"
      UITEST_SKIP_APPLE_WATCH: "true"

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 15000

# ============================================
# Navigate to Settings > Training Preferences
# ============================================

- tapOn:
    text: "More"
    retryTapIfNoChange: true

- tapOn:
    text: "Settings"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "settings_screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      text: "Training Preferences"
    direction: DOWN
    timeout: 10000
    speed: 25

- tapOn:
    text: "Training Preferences"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "training_preferences_screen"
    timeout: 10000

- takeScreenshot: artifacts/screenshots/ios-training-preferences-01-overview

# ============================================
# Adjust volume slider
# ============================================

- assertVisible:
    id: "volume_slider"

- tapOn:
    id: "volume_slider"
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/ios-training-preferences-02-volume

# ============================================
# Select hard days
# ============================================

- scrollUntilVisible:
    element:
      id: "hard_days_section"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "hard_days_section"

- tapOn:
    id: "hard_day_tuesday"
    optional: true
    retryTapIfNoChange: true

- tapOn:
    id: "hard_day_thursday"
    optional: true
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/ios-training-preferences-03-hard-days

# ============================================
# Toggle run days
# ============================================

- scrollUntilVisible:
    element:
      id: "run_days_section"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "run_days_section"

- tapOn:
    id: "run_day_monday"
    optional: true
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/ios-training-preferences-04-run-days

# ============================================
# Set goal race
# ============================================

- scrollUntilVisible:
    element:
      id: "goal_race_section"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "goal_race_section"

- tapOn:
    id: "goal_race_picker"
    optional: true
    retryTapIfNoChange: true

- takeScreenshot: artifacts/screenshots/ios-training-preferences-05-goal-race

# Dismiss picker if opened
- tapOn:
    text: "Done"
    optional: true
- waitForAnimationToEnd

# ============================================
# Verify changes persist (navigate away and back)
# ============================================

- tapOn:
    text: "More"
    retryTapIfNoChange: true

- tapOn:
    text: "Settings"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "settings_screen"
    timeout: 10000

- scrollUntilVisible:
    element:
      text: "Training Preferences"
    direction: DOWN
    timeout: 10000
    speed: 25

- tapOn:
    text: "Training Preferences"
    retryTapIfNoChange: true

- extendedWaitUntil:
    visible:
      id: "training_preferences_screen"
    timeout: 10000

- takeScreenshot: artifacts/screenshots/ios-training-preferences-06-persisted

# Verify previously selected values persisted
- scrollUntilVisible:
    element:
      id: "hard_days_section"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "hard_day_tuesday"
- assertVisible:
    id: "hard_day_thursday"

- scrollUntilVisible:
    element:
      id: "run_days_section"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "run_day_monday"

- scrollUntilVisible:
    element:
      id: "goal_race_section"
    direction: DOWN
    timeout: 10000
    speed: 25

- assertVisible:
    id: "goal_race_section"

- takeScreenshot: artifacts/screenshots/ios-training-preferences-07-verified-persisted

# Final assertions
- assertVisible:
    id: "training_preferences_screen"
- assertNotVisible:
    id: "error_view"
    optional: true
